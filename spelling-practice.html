<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spelling Stars ⭐</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600&display=swap');

  :root {
    --sky: #6EC6F5;
    --sun: #FFD93D;
    --grass: #6BCB77;
    --pink: #FF6B9D;
    --purple: #A855F7;
    --orange: #FF8C42;
    --bg: #FFF9F0;
    --card: #FFFFFF;
    --text: #2D2D4E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Decorative background */
  body::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; height: 220px;
    background: linear-gradient(160deg, #6EC6F5 0%, #B5E8FF 60%, #FFF9F0 100%);
    z-index: 0;
  }

  .stars-bg {
    position: fixed; top: 0; left: 0; right: 0; height: 220px;
    pointer-events: none; z-index: 1;
    overflow: hidden;
  }
  .star-deco {
    position: absolute;
    font-size: 1.4rem;
    animation: floatStar 4s ease-in-out infinite;
    opacity: 0.5;
  }

  @keyframes floatStar {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(20deg); }
  }

  /* ===== SCREENS ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== HOME ===== */
  #home {
    position: relative; z-index: 2;
    text-align: center;
    padding: 80px 20px 40px;
  }

  .app-title {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(2.2rem, 8vw, 3.5rem);
    font-weight: 900;
    color: white;
    text-shadow: 0 4px 0 rgba(0,0,0,0.15);
    letter-spacing: -1px;
    margin-bottom: 4px;
  }
  .app-subtitle {
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.85);
    margin-bottom: 40px;
  }

  .home-card {
    background: white;
    border-radius: 28px;
    padding: 28px 24px;
    max-width: 420px;
    margin: 0 auto 20px;
    box-shadow: 0 8px 32px rgba(110,198,245,0.18);
    border: 3px solid #E8F6FF;
  }

  .total-stars {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 2rem; font-weight: 900; color: var(--text);
    margin-bottom: 20px;
  }
  .total-stars span.big { font-size: 2.4rem; color: var(--sun); }

  .mode-btn {
    display: flex; align-items: center; gap: 14px;
    width: 100%; padding: 16px 20px;
    border: none; border-radius: 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.15rem; font-weight: 800;
    cursor: pointer; margin-bottom: 12px;
    transition: transform 0.15s, box-shadow 0.15s;
    color: white;
    text-align: left;
  }
  .mode-btn:active { transform: scale(0.97); }
  .mode-btn.fill { background: linear-gradient(135deg, #A855F7, #7C3AED); box-shadow: 0 4px 16px rgba(168,85,247,0.35); }
  .mode-btn.spell { background: linear-gradient(135deg, #FF6B9D, #E94060); box-shadow: 0 4px 16px rgba(255,107,157,0.35); }
  .mode-btn.review { background: linear-gradient(135deg, #FF8C42, #E56F28); box-shadow: 0 4px 16px rgba(255,140,66,0.30); }
  .mode-btn .icon { font-size: 1.6rem; }
  .mode-btn .desc { font-size: 0.78rem; font-weight: 600; opacity: 0.85; display: block; margin-top: 1px; }

  .progress-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.85rem; color: #888; margin-top: 16px;
  }
  .progress-bar-wrap { flex: 1; height: 8px; background: #EEE; border-radius: 99px; margin: 0 10px; }
  .progress-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--grass), #38D9A9); transition: width 0.5s; }

  /* ===== QUIZ SCREEN ===== */
  #quiz {
    position: relative; z-index: 2;
    padding: 20px 16px 40px;
    max-width: 500px; margin: 0 auto;
  }

  .quiz-header {
    display: flex; align-items: center; gap: 12px;
    padding-top: 60px; margin-bottom: 20px;
  }
  .back-btn {
    background: rgba(255,255,255,0.8);
    border: none; border-radius: 12px;
    width: 42px; height: 42px;
    font-size: 1.2rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .quiz-title {
    font-family: 'Nunito', sans-serif;
    font-size: 1.2rem; font-weight: 900; color: white;
    text-shadow: 0 2px 4px rgba(0,0,0,0.12);
  }
  .q-counter {
    margin-left: auto;
    background: rgba(255,255,255,0.85);
    border-radius: 10px; padding: 4px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem; font-weight: 800; color: var(--text);
  }

  .quiz-card {
    background: white;
    border-radius: 28px;
    padding: 30px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    border: 3px solid #F0F0FF;
    margin-bottom: 16px;
    text-align: center;
  }

  .word-display {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 900; color: var(--text);
    letter-spacing: 2px; margin-bottom: 10px;
  }
  .hint-text {
    font-size: 0.9rem; color: #aaa; margin-bottom: 20px;
  }

  .word-hint-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: linear-gradient(135deg, #FFF8DC, #FFF0A0);
    border: 2px solid #FFD93D;
    border-radius: 16px;
    padding: 10px 20px;
    margin-bottom: 18px;
    box-shadow: 0 2px 8px rgba(255,217,61,0.2);
  }
  .word-hint-badge::before { content: '💡'; font-size: 1.1rem; margin-bottom: 2px; }
  .hint-en {
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    color: #5A3E00;
  }
  .hint-jp {
    font-family: 'Nunito Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: #8A6A20;
    letter-spacing: 0.5px;
  }
  .blanks-row {
    display: flex; justify-content: center; gap: 6px;
    flex-wrap: wrap; margin-bottom: 20px;
  }
  .blank-letter {
    width: 44px; height: 52px;
    border: 3px solid #DDD; border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.5rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    color: var(--text); transition: all 0.2s;
    background: #FAFAFA;
  }
  .blank-letter.revealed { border-color: var(--purple); background: #F5EEFF; color: var(--purple); }
  .blank-letter.blank { border-color: var(--sky); background: white; color: var(--sky); font-size: 1rem; }

  .choices-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-top: 10px;
  }
  .choice-btn {
    padding: 14px 10px;
    border: 3px solid #EEE; border-radius: 16px;
    background: white; cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem; font-weight: 800;
    color: var(--text); transition: all 0.18s;
    letter-spacing: 1px;
  }
  .choice-btn:hover { border-color: var(--purple); background: #F5EEFF; }
  .choice-btn.correct { border-color: var(--grass); background: #EDFFF3; color: #27AE60; animation: pop 0.3s; }
  .choice-btn.wrong { border-color: #FF6B6B; background: #FFF0F0; color: #E84040; animation: shake 0.3s; }

  /* Spell input */
  .spell-input-wrap { position: relative; margin-top: 8px; }
  .spell-input {
    width: 100%; padding: 18px 20px;
    border: 3px solid #DDD; border-radius: 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.6rem; font-weight: 800;
    color: var(--text); text-align: center;
    letter-spacing: 4px; outline: none;
    transition: border-color 0.2s;
  }
  .spell-input:focus { border-color: var(--pink); }
  .spell-input.correct { border-color: var(--grass); background: #EDFFF3; }
  .spell-input.wrong { border-color: #FF6B6B; background: #FFF0F0; animation: shake 0.3s; }

  .submit-btn {
    width: 100%; padding: 16px;
    border: none; border-radius: 18px;
    background: linear-gradient(135deg, var(--pink), #E94060);
    color: white; font-family: 'Nunito', sans-serif;
    font-size: 1.2rem; font-weight: 900;
    cursor: pointer; margin-top: 12px;
    box-shadow: 0 4px 16px rgba(255,107,157,0.35);
    transition: transform 0.15s;
    letter-spacing: 0.5px;
  }
  .submit-btn:active { transform: scale(0.97); }

  .speak-btn {
    background: linear-gradient(135deg, var(--sky), #3B9ED4);
    border: none; border-radius: 16px;
    padding: 12px 24px; color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem; font-weight: 800;
    cursor: pointer; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
    margin: 0 auto 16px;
    box-shadow: 0 4px 12px rgba(59,158,212,0.3);
    transition: transform 0.15s;
  }
  .speak-btn:active { transform: scale(0.95); }

  /* Feedback overlay */
  .feedback-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0;
    transition: opacity 0.2s;
  }
  .feedback-overlay.show { opacity: 1; pointer-events: all; }
  .feedback-bubble {
    background: white; border-radius: 28px;
    padding: 32px 40px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    transform: scale(0.8);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .feedback-overlay.show .feedback-bubble { transform: scale(1); }
  .feedback-emoji { font-size: 4rem; display: block; margin-bottom: 8px; }
  .feedback-msg {
    font-family: 'Nunito', sans-serif;
    font-size: 1.6rem; font-weight: 900; color: var(--text);
  }
  .feedback-word {
    font-size: 1.1rem; color: #888; margin-top: 6px;
  }

  /* Result screen */
  #result {
    position: relative; z-index: 2;
    text-align: center; padding: 80px 20px 40px;
  }
  .result-card {
    background: white; border-radius: 28px;
    padding: 36px 28px; max-width: 420px; margin: 0 auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  }
  .result-title {
    font-family: 'Nunito', sans-serif;
    font-size: 2rem; font-weight: 900; color: var(--text);
    margin-bottom: 8px;
  }
  .result-score {
    font-family: 'Nunito', sans-serif;
    font-size: 3.5rem; font-weight: 900;
    color: var(--purple); line-height: 1;
    margin: 16px 0;
  }
  .result-stars {
    font-size: 2rem; letter-spacing: 4px; margin-bottom: 20px;
  }
  .missed-list {
    background: #FFF5F5; border-radius: 16px;
    padding: 16px; margin-bottom: 20px; text-align: left;
  }
  .missed-list h3 {
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem; font-weight: 800;
    color: #E84040; margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .missed-word {
    display: inline-block;
    background: white; border: 2px solid #FFD0D0;
    border-radius: 8px; padding: 4px 10px;
    margin: 3px; font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 0.95rem; color: var(--text);
  }
  .home-btn {
    width: 100%; padding: 16px;
    border: none; border-radius: 18px;
    background: linear-gradient(135deg, var(--grass), #27AE60);
    color: white; font-family: 'Nunito', sans-serif;
    font-size: 1.2rem; font-weight: 900;
    cursor: pointer; margin-top: 8px;
    box-shadow: 0 4px 16px rgba(107,203,119,0.35);
  }

  /* Review screen */
  #review {
    position: relative; z-index: 2;
    padding: 20px 16px 40px; max-width: 500px; margin: 0 auto;
  }
  .review-header {
    display: flex; align-items: center; gap: 12px;
    padding-top: 60px; margin-bottom: 20px;
  }
  .words-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .word-chip {
    background: white; border-radius: 12px;
    padding: 10px 6px; text-align: center;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; font-weight: 800; color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border: 2px solid #F0F0F0;
    cursor: pointer; transition: all 0.15s;
    position: relative;
  }
  .word-chip.known { border-color: var(--grass); background: #EDFFF3; color: #27AE60; }
  .word-chip.unknown { border-color: #FFD0D0; background: #FFF5F5; color: #E84040; }
  .word-chip:hover { transform: scale(1.04); }

  /* Animations */
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  .confetti-piece {
    position: fixed; width: 10px; height: 10px;
    border-radius: 2px; pointer-events: none; z-index: 200;
    animation: confetti-fall 1.8s ease-in forwards;
  }
</style>
</head>
<body>

<!-- Floating star decorations -->
<div class="stars-bg" id="starsBg"></div>

<!-- ========== HOME ========== -->
<div id="home" class="screen active">
  <div class="app-title">⭐ Spelling Stars</div>
  <div class="app-subtitle">Oxford Word List 1–100</div>

  <div class="home-card">
    <div class="total-stars">
      <span class="big">⭐</span>
      <span id="totalStarsDisplay">0</span> stars collected!
    </div>

    <div class="progress-row">
      <span id="progressLabel">0 / 100</span>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
      <span>words</span>
    </div>

    <br>

    <button class="mode-btn fill" onclick="startMode('fill')">
      <span class="icon">🔤</span>
      <div>
        Fill in the Missing Letter
        <span class="desc">Which letter is missing? Choose it!</span>
      </div>
    </button>

    <button class="mode-btn spell" onclick="startMode('spell')">
      <span class="icon">🎧</span>
      <div>
        Spell the Word
        <span class="desc">Listen and type the whole word!</span>
      </div>
    </button>

    <button class="mode-btn review" onclick="showReview()">
      <span class="icon">📖</span>
      <div>
        Word List
        <span class="desc">See all 100 words</span>
      </div>
    </button>
  </div>
</div>

<!-- ========== QUIZ ========== -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="quiz-title" id="quizModeLabel">Fill in the Blank</div>
    <div class="q-counter"><span id="qCurrent">1</span> / <span id="qTotal">10</span></div>
  </div>

  <div class="quiz-card">
    <!-- Fill mode -->
    <div id="fillSection">
      <div class="word-hint-badge" id="wordHintBadge"></div>
      <div class="blanks-row" id="blanksRow"></div>
      <div class="hint-text">Which letter is missing?</div>
      <div class="choices-grid" id="choicesGrid"></div>
    </div>

    <!-- Spell mode -->
    <div id="spellSection" style="display:none">
      <button class="speak-btn" id="speakBtn" onclick="speakWord()">
        🔊 Hear the word
      </button>
      <div class="spell-input-wrap">
        <input class="spell-input" id="spellInput" type="text"
          autocomplete="off" autocorrect="off" spellcheck="false"
          placeholder="type here..." maxlength="20"
          onkeydown="if(event.key==='Enter')checkSpell()">
      </div>
      <button class="submit-btn" onclick="checkSpell()">✓ Check!</button>
    </div>
  </div>
</div>

<!-- ========== RESULT ========== -->
<div id="result" class="screen">
  <div class="result-card">
    <div class="result-title" id="resultTitle">Amazing! 🎉</div>
    <div class="result-score" id="resultScore">10/10</div>
    <div class="result-stars" id="resultStars">⭐⭐⭐⭐⭐</div>
    <div class="missed-list" id="missedList" style="display:none">
      <h3>🔁 Practice these again</h3>
      <div id="missedWords"></div>
    </div>
    <button class="submit-btn" onclick="startMode(currentMode)" style="margin-bottom:10px">▶ Play Again</button>
    <button class="home-btn" onclick="goHome()">🏠 Home</button>
  </div>
</div>

<!-- ========== REVIEW ========== -->
<div id="review" class="screen">
  <div class="review-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="quiz-title" style="color:var(--text)">All 100 Words</div>
  </div>
  <div class="words-grid" id="wordsGrid"></div>
</div>

<!-- ========== FEEDBACK OVERLAY ========== -->
<div class="feedback-overlay" id="feedbackOverlay">
  <div class="feedback-bubble">
    <span class="feedback-emoji" id="feedbackEmoji">⭐</span>
    <div class="feedback-msg" id="feedbackMsg">Correct!</div>
    <div class="feedback-word" id="feedbackWord"></div>
  </div>
</div>

<script>
// ===== DATA =====
const WORD_DATA = [
  {w:"the",    en:"used before a specific thing",         jp:"その〜、あの〜"},
  {w:"and",    en:"joins two things together",            jp:"〜と、そして"},

  {w:"was",    en:"past tense of 'is' or 'am'",           jp:"〜だった"},
  {w:"it",     en:"a thing, not a person",                jp:"それ"},
  {w:"my",     en:"belonging to me",                      jp:"わたしの"},

  {w:"had",    en:"past tense of 'have'",                 jp:"もっていた"},
  {w:"there",  en:"at that place",                        jp:"そこに"},
  {w:"you",    en:"the person being spoken to",           jp:"あなた"},

  {w:"as",     en:"in the role of / like",                jp:"〜として、〜のように"},
  {w:"like",   en:"to enjoy / similar to",                jp:"すき、〜のように"},
  {w:"back",   en:"return / the rear side",               jp:"もどる、うしろ"},
  {w:"after",  en:"later than / following",               jp:"〜のあとに"},
  {w:"going",  en:"-ing form of 'go'",                    jp:"いっている、いく（ing）"},
  {w:"him",    en:"a boy — as the object",                jp:"かれを、かれに"},
  {w:"what",   en:"asks about a thing",                   jp:"なに、なんの"},
  {w:"be",     en:"base form of 'is / am / are'",         jp:"〜である、〜になる"},
  {w:"dad",    en:"your father",                          jp:"おとうさん"},
  {w:"not",    en:"the opposite / negative",              jp:"〜ではない"},
  {w:"do",     en:"to perform an action",                 jp:"する、やる"},
  {w:"them",   en:"those people or things — as object",   jp:"かれらを、それらを"},
  {w:"two",    en:"the number 2",                         jp:"に、ふたつ"},
  {w:"school", en:"where you go to learn",                jp:"がっこう"},
  {w:"some",   en:"a few / a little",                     jp:"いくつかの"},
  {w:"this",   en:"the thing right here",                 jp:"これ、この"},
  {w:"did",    en:"past tense of 'do'",                   jp:"した（doのかこ）"},
  {w:"next",   en:"coming after / the one after",         jp:"つぎの、つぎに"},
  {w:"ran",    en:"past tense of 'run'",                  jp:"はしった（runのかこ）"},
  {w:"could",  en:"past tense of 'can'",                  jp:"できた（canのかこ）"},
  {w:"very",   en:"to a great degree",                    jp:"とても"},
  {w:"from",   en:"the starting point",                   jp:"〜から"},
  {w:"into",   en:"moving to the inside",                 jp:"〜のなかへ"},
  {w:"can",    en:"to be able to do something",           jp:"できる"},
  {w:"their",  en:"belonging to them",                    jp:"かれらの"},
  {w:"will",   en:"something that will happen",           jp:"〜するでしょう（みらい）"},
  {w:"an",     en:"one of something (before a vowel)",    jp:"ひとつの（ぼいんのまえ）"},
  {w:"about",  en:"on the topic of / nearly",             jp:"〜について、だいたい"},
  {w:"played", en:"past tense of 'play'",                 jp:"あそんだ、プレーした"},
  {w:"people", en:"more than one person",                 jp:"ひとびと、みんな"},
  {w:"down",   en:"toward a lower place",                 jp:"したに、したへ"},
  {w:"no",     en:"not any / the opposite of yes",        jp:"いいえ、〜がない"},
  {w:"big",    en:"large in size",                        jp:"おおきい"},
  {w:"just",   en:"exactly / only / a moment ago",        jp:"ちょうど、ただ〜だけ"},
  {w:"ours",   en:"belonging to us",                      jp:"わたしたちのもの"},
  {w:"off",    en:"away from / not on",                   jp:"はなれて、オフ"},
  {w:"didn't", en:"did not (short form)",                 jp:"しなかった（did notのたんしゅく）"},
  {w:"put",    en:"to place something somewhere",         jp:"おく、おいた"},
  {w:"friends",en:"people you like and play with",        jp:"ともだち（ふくすう）"},
  {w:"am",     en:"'be' when talking about yourself",     jp:"〜です（I amのかたち）"},
  {w:"would",  en:"used for wishes or polite asks",       jp:"〜するでしょう"},
  {w:"see",    en:"to look at / to understand",           jp:"みる、みえる"},
  {w:"once",   en:"one time / in the past",               jp:"いちど、むかし"},
  {w:"little", en:"small in size or amount",              jp:"ちいさい、すこし"},
  {w:"play",   en:"to have fun with games or toys",       jp:"あそぶ"},
  {w:"if",     en:"in the case that / supposing",         jp:"もし〜なら"},
  {w:"name",   en:"what something or someone is called",  jp:"なまえ"},
  {w:"night",  en:"the dark time after sunset",           jp:"よる"},
  {w:"found",  en:"past tense of 'find'",                 jp:"みつけた（findのかこ）"}
];
const WORDS = WORD_DATA.map(d => d.w);
const HINTS = Object.fromEntries(WORD_DATA.map(d => [d.w, {en: d.en, jp: d.jp}]));

let totalStars = parseInt(localStorage.getItem('spellingStars') || '0');
let knownWords = JSON.parse(localStorage.getItem('knownWords') || '[]');
let currentMode = 'fill';
let quizWords = [];
let qIndex = 0;
let score = 0;
let missed = [];
let currentWord = '';

// ===== INIT =====
function init() {
  updateHomeStats();
  buildStarsBg();
  buildReviewGrid();
}

function buildStarsBg() {
  const bg = document.getElementById('starsBg');
  const stars = ['⭐','🌟','✨','💫'];
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'star-deco';
    s.textContent = stars[i % stars.length];
    s.style.left = (Math.random() * 100) + '%';
    s.style.top = (Math.random() * 90) + '%';
    s.style.animationDelay = (Math.random() * 3) + 's';
    s.style.fontSize = (0.9 + Math.random() * 1.2) + 'rem';
    bg.appendChild(s);
  }
}

function updateHomeStats() {
  document.getElementById('totalStarsDisplay').textContent = totalStars;
  const pct = Math.round((knownWords.length / 100) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = knownWords.length + ' / 100';
}

function buildReviewGrid() {
  const grid = document.getElementById('wordsGrid');
  grid.innerHTML = '';
  WORDS.forEach(w => {
    const chip = document.createElement('div');
    chip.className = 'word-chip' + (knownWords.includes(w) ? ' known' : '');
    chip.textContent = w;
    chip.onclick = () => speakSingle(w);
    grid.appendChild(chip);
  });
}

// ===== SCREENS =====
function goHome() {
  showScreen('home');
  updateHomeStats();
  buildReviewGrid();
}
function showReview() { showScreen('review'); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== MODE START =====
function startMode(mode) {
  currentMode = mode;
  quizWords = shuffle([...WORDS]).slice(0, 10);
  qIndex = 0; score = 0; missed = [];
  showScreen('quiz');
  document.getElementById('quizModeLabel').textContent =
    mode === 'fill' ? '🔤 Fill in the Blank' : '🎧 Spell the Word';
  document.getElementById('qTotal').textContent = quizWords.length;
  document.getElementById('fillSection').style.display = mode === 'fill' ? 'block' : 'none';
  document.getElementById('spellSection').style.display = mode === 'spell' ? 'block' : 'none';
  loadQuestion();
}

function loadQuestion() {
  if (qIndex >= quizWords.length) { showResult(); return; }
  currentWord = quizWords[qIndex];
  document.getElementById('qCurrent').textContent = qIndex + 1;
  if (currentMode === 'fill') loadFill();
  else loadSpell();
}

// ===== FILL MODE =====
function loadFill() {
  const word = currentWord;
  const hint = HINTS[word];
  const badge = document.getElementById('wordHintBadge');
  badge.innerHTML = `<span class="hint-en">${hint.en}</span><span class="hint-jp">${hint.jp}</span>`;
  // Pick a random letter index to blank out
  const blankIdx = Math.floor(Math.random() * word.length);
  const correctLetter = word[blankIdx].toUpperCase();

  // Build blanks row
  const row = document.getElementById('blanksRow');
  row.innerHTML = '';
  for (let i = 0; i < word.length; i++) {
    const div = document.createElement('div');
    if (i === blankIdx) {
      div.className = 'blank-letter blank';
      div.textContent = '?';
      div.id = 'blankTarget';
    } else {
      div.className = 'blank-letter revealed';
      div.textContent = word[i].toUpperCase();
    }
    row.appendChild(div);
  }

  // Build choices: correct + 3 wrong
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const wrongs = shuffle(alphabet.filter(l => l !== correctLetter)).slice(0, 3);
  const choices = shuffle([correctLetter, ...wrongs]);

  const grid = document.getElementById('choicesGrid');
  grid.innerHTML = '';
  choices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = ch;
    btn.onclick = () => checkFill(btn, ch, correctLetter, word);
    grid.appendChild(btn);
  });
}

function checkFill(btn, chosen, correct, word) {
  // Disable all buttons
  document.querySelectorAll('.choice-btn').forEach(b => b.onclick = null);
  const isCorrect = chosen === correct;
  btn.classList.add(isCorrect ? 'correct' : 'wrong');

  // If wrong, reveal correct
  if (!isCorrect) {
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
    });
    missed.push(word);
  } else {
    score++;
    if (!knownWords.includes(word)) knownWords.push(word);
    totalStars++;
    saveProgress();
  }

  // Fill in the blank visually
  const target = document.getElementById('blankTarget');
  if (target) {
    target.textContent = correct;
    target.className = 'blank-letter ' + (isCorrect ? 'revealed' : 'blank');
    target.style.borderColor = isCorrect ? 'var(--grass)' : '#FF6B6B';
  }

  showFeedback(isCorrect, word);
  setTimeout(() => {
    hideFeedback();
    qIndex++;
    loadQuestion();
  }, 1200);
}

// ===== SPELL MODE =====
let spellLocked = false;

function loadSpell() {
  spellLocked = false;
  const input = document.getElementById('spellInput');
  input.value = '';
  input.className = 'spell-input';
  input.disabled = false;
  input.focus();
  // Auto-speak
  setTimeout(() => speakWord(), 300);
}

function speakWord() { speakSingle(currentWord); }
function speakSingle(w) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(w);
  u.rate = 0.85; u.lang = 'en-AU';
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

function checkSpell() {
  if (spellLocked) return;
  const input = document.getElementById('spellInput');
  const typed = input.value.trim().toLowerCase();
  if (!typed) return;
  spellLocked = true;
  const isCorrect = typed === currentWord.toLowerCase();
  input.className = 'spell-input ' + (isCorrect ? 'correct' : 'wrong');

  if (isCorrect) {
    score++;
    if (!knownWords.includes(currentWord)) knownWords.push(currentWord);
    totalStars++;
    saveProgress();
  } else {
    missed.push(currentWord);
    // Show correct answer
    setTimeout(() => { input.value = currentWord; }, 400);
  }

  showFeedback(isCorrect, currentWord);
  setTimeout(() => {
    hideFeedback();
    qIndex++;
    loadQuestion();
  }, 1400);
}

// ===== FEEDBACK =====
const CORRECT_MSGS = ['Perfect! ⭐','Amazing! 🌟','Great job! 🎉','You got it! 💫','Brilliant! ✨'];
const WRONG_MSGS = ['Almost! 💪','Try again! 🔁','Keep going! 😊','Good try! 👍'];

function showFeedback(correct, word) {
  const overlay = document.getElementById('feedbackOverlay');
  document.getElementById('feedbackEmoji').textContent = correct ? '⭐' : '💪';
  document.getElementById('feedbackMsg').textContent =
    correct ? CORRECT_MSGS[Math.floor(Math.random()*CORRECT_MSGS.length)]
            : WRONG_MSGS[Math.floor(Math.random()*WRONG_MSGS.length)];
  document.getElementById('feedbackWord').textContent = word;
  overlay.classList.add('show');
  if (correct) spawnConfetti();
}
function hideFeedback() {
  document.getElementById('feedbackOverlay').classList.remove('show');
}

// ===== RESULT =====
function showResult() {
  showScreen('result');
  const pct = Math.round((score / quizWords.length) * 100);
  let title = pct === 100 ? 'Perfect Score! 🏆' : pct >= 80 ? 'Great Job! 🌟' : pct >= 50 ? 'Good Try! 💪' : 'Keep Practicing! 📚';
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultScore').textContent = score + ' / ' + quizWords.length;
  const stars = Math.round((score / quizWords.length) * 5);
  document.getElementById('resultStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(5-stars);

  if (missed.length > 0) {
    document.getElementById('missedList').style.display = 'block';
    document.getElementById('missedWords').innerHTML = missed.map(w =>
      `<span class="missed-word" onclick="speakSingle('${w}')">${w}</span>`
    ).join('');
  } else {
    document.getElementById('missedList').style.display = 'none';
  }

  if (pct === 100) spawnConfetti();
}

// ===== CONFETTI =====
function spawnConfetti() {
  const colors = ['#FFD93D','#FF6B9D','#6EC6F5','#6BCB77','#A855F7','#FF8C42'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.animationDuration = (1.2 + Math.random()*1.2) + 's';
      el.style.animationDelay = (Math.random()*0.5) + 's';
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }, i * 30);
  }
}

// ===== UTILS =====
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function saveProgress() {
  localStorage.setItem('spellingStars', totalStars);
  localStorage.setItem('knownWords', JSON.stringify(knownWords));
}

init();
</script>
